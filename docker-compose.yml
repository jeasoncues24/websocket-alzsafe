# docker-compose.yml
# Uso: docker compose run --rm backend-build
# Deja el binario compilado en ./dist/wsapi

services:
  backend-build:
    build:
      context: ./backend
      dockerfile: ../docker/go/Dockerfile
      network: host
    volumes:
      - ./dist:/dist
    entrypoint: ["sh", "-c", "cp /usr/local/bin/wsapi /dist/wsapi && echo 'Binario listo en ./dist/wsapi'"]
    restart: "no"