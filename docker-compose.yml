services:
  backend:
    build:
      context: .
      dockerfile: docker/go/Dockerfile
    env_file:
      - .env
    environment:
      APP_PORT: ${APP_PORT:-8080}
      WHATSAPP_SQLITE_DIR: ${WHATSAPP_SQLITE_DIR:-/app/sessions/whatsappmeow}
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    volumes:
      - wsapi-sessions:/app/sessions
      - wsapi-debug-log:/app/debug_log
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://backend:${APP_PORT:-8080}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  wsapi-sessions:
  wsapi-debug-log:
